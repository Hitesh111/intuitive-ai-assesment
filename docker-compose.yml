services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vm_lifecycle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/vm_lifecycle
      DEBUG: "True"
      SECRET_KEY: dev-secret-key
      ALLOWED_HOSTS: "*"
    depends_on:
      - db

volumes:
  pg_data:
